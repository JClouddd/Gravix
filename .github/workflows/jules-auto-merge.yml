name: Jules Auto Merge

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Jules creates PRs under the repo owner's account, not a bot account.
    # Jules branches always end with a numeric session ID suffix (10+ digits).
    # Match: feat/, fix/, refactor/, feature/, jules/, add-, list-, code-health-, optimize-, ui-states-
    if: >
      contains(github.head_ref, '-') &&
      (startsWith(github.head_ref, 'jules/') ||
       startsWith(github.head_ref, 'feat/') ||
       startsWith(github.head_ref, 'feature/') ||
       startsWith(github.head_ref, 'fix/') ||
       startsWith(github.head_ref, 'refactor/') ||
       startsWith(github.head_ref, 'add-') ||
       startsWith(github.head_ref, 'list-') ||
       startsWith(github.head_ref, 'code-health-') ||
       startsWith(github.head_ref, 'optimize-') ||
       startsWith(github.head_ref, 'ui-states-'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Jules branch (session ID suffix)
        id: verify
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"

          # Jules branches always end with a long numeric session ID (10+ digits)
          # e.g. feat/contacts-integration-13249628978846934090
          if echo "$BRANCH" | grep -qE '[0-9]{10,}$'; then
            echo "✅ Jules session ID suffix found"
            echo "jules=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No Jules session ID suffix — skipping auto-merge"
            echo "jules=false" >> $GITHUB_OUTPUT
          fi

      - name: Wait for CI (max 10 min)
        if: steps.verify.outputs.jules == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for test job to complete..."
          COMMIT_SHA=${{ github.event.pull_request.head.sha }}
          REPO=${{ github.repository }}
          MAX_WAIT=600  # 10 minutes
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Fetch check runs for the specific commit
            CHECKS=$(gh api repos/$REPO/commits/$COMMIT_SHA/check-runs 2>/dev/null || echo '{"check_runs":[]}')

            # Find the test job status and conclusion
            TEST_STATUS=$(echo "$CHECKS" | jq -r '.check_runs[] | select(.name=="test") | .status')
            TEST_CONCLUSION=$(echo "$CHECKS" | jq -r '.check_runs[] | select(.name=="test") | .conclusion')

            if [ "$TEST_STATUS" == "completed" ]; then
              if [ "$TEST_CONCLUSION" == "success" ]; then
                echo "✅ Test job completed successfully."
                break
              else
                echo "❌ Test job failed with conclusion: $TEST_CONCLUSION"
                exit 1
              fi
            fi

            # If no test job exists yet (CI hasn't started), wait
            if [ -z "$TEST_STATUS" ]; then
              echo "⏳ No test job found yet ($ELAPSED/${MAX_WAIT}s). Waiting 15s..."
            else
              echo "⏳ Test status: $TEST_STATUS ($ELAPSED/${MAX_WAIT}s). Waiting 15s..."
            fi

            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "⚠️ Timed out after ${MAX_WAIT}s waiting for CI. Proceeding anyway."
          fi


      - name: Check file overlap with other Jules PRs
        id: overlap
        if: steps.verify.outputs.jules == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          # Get files changed in this PR
          MY_FILES=$(gh pr diff $PR_NUMBER --name-only | sort)
          echo "Files in this PR:"
          echo "$MY_FILES"

          # Get all other open PRs with Jules-style branches (10+ digit suffix)
          OTHER_PRS=$(gh pr list --state open --json number,headRefName \
            --jq ".[] | select(.number != $PR_NUMBER) | select(.headRefName | test(\"[0-9]{10,}$\")) | .number")

          OVERLAP_FOUND=false
          for OTHER in $OTHER_PRS; do
            OTHER_FILES=$(gh pr diff $OTHER --name-only 2>/dev/null | sort || echo "")
            if [ -z "$OTHER_FILES" ]; then continue; fi

            OVERLAP=$(comm -12 <(echo "$MY_FILES") <(echo "$OTHER_FILES"))
            if [ -n "$OVERLAP" ]; then
              echo "⚠️ File overlap with PR #$OTHER:"
              echo "$OVERLAP"
              OVERLAP_FOUND=true
            fi
          done

          if [ "$OVERLAP_FOUND" = true ]; then
            echo "🚫 Blocking auto-merge — file overlap detected with another Jules PR"
            gh pr edit $PR_NUMBER --add-label "needs-review" 2>/dev/null || true
            echo "safe=false" >> $GITHUB_OUTPUT
          else
            echo "✅ No file overlap — safe to auto-merge"
            echo "safe=true" >> $GITHUB_OUTPUT
          fi

      - name: Auto-approve
        if: steps.verify.outputs.jules == 'true' && steps.overlap.outputs.safe == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review ${{ github.event.pull_request.html_url }} --approve

      - name: Update branch before merge
        if: steps.verify.outputs.jules == 'true' && steps.overlap.outputs.safe == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          # Update the branch to latest main to avoid non-fast-forward errors
          # This handles the case where another Jules PR was merged first
          echo "Updating branch to latest main..."
          gh api -X PUT repos/$REPO/pulls/$PR_NUMBER/update-branch \
            --field expected_head_sha=${{ github.event.pull_request.head.sha }} \
            2>/dev/null || echo "Branch already up to date (or update not needed)"

          # Give GitHub a moment to process the update
          sleep 5

      - name: Auto-merge with retry
        if: steps.verify.outputs.jules == 'true' && steps.overlap.outputs.safe == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=${{ github.event.pull_request.html_url }}
          MAX_RETRIES=3
          RETRY=0

          while [ $RETRY -lt $MAX_RETRIES ]; do
            if gh pr merge "$PR_URL" --squash; then
              echo "✅ PR merged successfully"
              exit 0
            fi

            RETRY=$((RETRY + 1))
            echo "⚠️ Merge attempt $RETRY/$MAX_RETRIES failed. Waiting 10s and retrying..."

            # Try updating the branch again before retry
            PR_NUMBER=${{ github.event.pull_request.number }}
            REPO=${{ github.repository }}
            HEAD_SHA=$(gh api repos/$REPO/pulls/$PR_NUMBER --jq '.head.sha')
            gh api -X PUT repos/$REPO/pulls/$PR_NUMBER/update-branch \
              --field expected_head_sha=$HEAD_SHA 2>/dev/null || true

            sleep 10
          done

          echo "❌ Failed to merge after $MAX_RETRIES attempts"
          exit 1
